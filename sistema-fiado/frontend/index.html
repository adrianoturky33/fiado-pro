<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiado Pro - Gestão de Crédito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBloWH-Tf183YRw945ho8Jcc_EqsfD38tM",
            authDomain: "sistema-fiado.firebaseapp.com",
            projectId: "sistema-fiado",
            storageBucket: "sistema-fiado.firebasestorage.app",
            messagingSenderId: "28950483459",
            appId: "1:28950483459:web:8382ad04e6b9ebe076f436"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.fb = { collection, getDocs, addDoc, deleteDoc, doc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-5xl mx-auto p-6">

    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
        <input id="inNome" placeholder="Nome" class="bg-slate-800 p-3 rounded">
        <input id="inApelido" placeholder="Apelido" class="bg-slate-800 p-3 rounded">
        <input id="inTel" placeholder="Telefone" class="bg-slate-800 p-3 rounded">
        <input id="inVenc" type="number" placeholder="Vencimento" class="bg-slate-800 p-3 rounded">
        <button onclick="cadastrarCliente()" class="bg-green-600 p-3 rounded">Salvar</button>
    </div>

    <input id="inputBusca" oninput="render()" placeholder="Buscar..." class="w-full bg-slate-800 p-3 rounded mb-6">

    <div id="listaClientes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

</div>

<!-- MODAL VENDA -->
<div id="modalVenda" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-slate-800 p-6 rounded w-full max-w-md">
        <h2 class="mb-4">Nova Venda</h2>
        <input id="vendaProd" placeholder="Produto" class="w-full p-2 mb-2 bg-slate-700 rounded">
        <input id="vendaQtd" type="number" value="1" class="w-full p-2 mb-2 bg-slate-700 rounded">
        <input id="vendaPreco" type="number" placeholder="Preço" class="w-full p-2 mb-4 bg-slate-700 rounded">
        <button onclick="concluirVenda()" class="bg-green-600 p-2 w-full rounded">Confirmar</button>
    </div>
</div>

<!-- MODAL PAGAMENTO -->
<div id="modalPaga" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-slate-800 p-6 rounded w-full max-w-md">
        <h2 class="mb-4">Pagamento</h2>
        <input id="pagaValor" type="number" placeholder="Valor" class="w-full p-2 mb-4 bg-slate-700 rounded">
        <button onclick="confirmarPagamento()" class="bg-green-600 p-2 w-full rounded">Confirmar</button>
    </div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem('fiado_db_v2')) || [];
let idAtual = null;

window.onload = () => {
    render();
    carregarFirebase();
};

function salvar() {
    localStorage.setItem('fiado_db_v2', JSON.stringify(clientes));
    salvarFirebase();
    render();
}

async function salvarFirebase() {
    if (!window.db) return;

    const snapshot = await fb.getDocs(fb.collection(db, "clientes"));

    for (const d of snapshot.docs) {
        await fb.deleteDoc(fb.doc(db, "clientes", d.id));
    }

    for (let c of clientes) {
        await fb.addDoc(fb.collection(db, "clientes"), c);
    }
}

async function carregarFirebase() {
    const snapshot = await fb.getDocs(fb.collection(db, "clientes"));
    clientes = snapshot.docs.map(d => d.data());
    render();
}

function cadastrarCliente() {
    const nome = inNome.value;
    const venc = inVenc.value;

    if(!nome || !venc) return;

    clientes.push({
        id: Date.now(),
        nome,
        apelido: inApelido.value,
        telefone: inTel.value,
        vencimento: parseInt(venc),
        saldo: 0,
        historico: []
    });

    salvar();
}

function abrirVenda(id){
    idAtual = id;
    document.getElementById('modalVenda').classList.remove('hidden');
}

function concluirVenda(){
    const c = clientes.find(x => x.id === idAtual);
    const preco = parseFloat(vendaPreco.value);
    const qtd = parseInt(vendaQtd.value);

    if(!preco) return;

    const total = preco * qtd;
    c.saldo += total;

    document.getElementById('modalVenda').classList.add('hidden');
    salvar();
}

function abrirPagamento(id){
    idAtual = id;
    document.getElementById('modalPaga').classList.remove('hidden');
}

function confirmarPagamento(){
    const c = clientes.find(x => x.id === idAtual);
    const valor = parseFloat(pagaValor.value);

    if(!valor) return;

    c.saldo -= valor;

    document.getElementById('modalPaga').classList.add('hidden');
    salvar();
}

function excluirCliente(id){
    clientes = clientes.filter(c => c.id !== id);
    salvar();
}

function render(){
    const busca = inputBusca.value.toLowerCase();
    listaClientes.innerHTML = "";

    clientes.filter(c => c.nome.toLowerCase().includes(busca))
    .forEach(c => {
        listaClientes.innerHTML += `
            <div class="bg-slate-800 p-4 rounded flex justify-between items-center">
                <div>
                    <h3>${c.nome}</h3>
                    <p>Saldo: R$ ${c.saldo.toFixed(2)}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="abrirVenda(${c.id})">➕</button>
                    <button onclick="abrirPagamento(${c.id})">💲</button>
                    <button onclick="excluirCliente(${c.id})">🗑</button>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
