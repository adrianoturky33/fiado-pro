<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiado Pro - Estável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBloWH-Tf183YRw945ho8Jcc_EqsfD38tM",
            authDomain: "sistema-fiado.firebaseapp.com",
            projectId: "sistema-fiado",
            storageBucket: "sistema-fiado.firebasestorage.app",
            messagingSenderId: "28950483459",
            appId: "1:28950483459:web:8382ad04e6b9ebe076f436"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarFirebase = async (dados) => {
            try {
                const colRef = collection(db, "clientes");
                const snapshot = await getDocs(colRef);
                for (const d of snapshot.docs) { await deleteDoc(doc(db, "clientes", d.id)); }
                for (let c of dados) { await addDoc(colRef, c); }
            } catch (e) { console.error("Erro Cloud:", e); }
        };

        window.carregarFirebase = async () => {
            try {
                const snapshot = await getDocs(collection(db, "clientes"));
                const dados = snapshot.docs.map(d => d.data());
                if (dados.length > 0) {
                    window.clientes = dados.map(c => ({
                        ...c,
                        saldo: c.saldo || 0,
                        historico: c.historico || []
                    }));
                    window.render();
                    window.atualizarDashboard();
                }
            } catch (e) { console.error("Erro Load:", e); }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1222; color: #e2e8f0; }
        .glass-card { background: #111a2c; border: 1px solid #1e293b; border-radius: 1.5rem; }
        .input-dark { background: #0f172a; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.75rem; color: white; outline: none; }
        .btn-primary { background: #10b981; color: white; font-weight: 800; padding: 0.75rem; border-radius: 0.75rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-2xl font-black text-emerald-500">FIADO PRO</h1>
        <div class="flex gap-4">
            <div class="glass-card px-4 py-2">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Total</p>
                <h2 id="dashTotal" class="text-lg font-bold">R$ 0,00</h2>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        <aside class="lg:col-span-1">
            <div class="glass-card p-6 space-y-4">
                <h3 class="font-bold mb-2">Novo Cliente</h3>
                <input id="inNome" placeholder="Nome" class="input-dark w-full">
                <input id="inVenc" type="number" placeholder="Dia Vencimento" class="input-dark w-full">
                <button onclick="cadastrarCliente()" class="btn-primary w-full">SALVAR</button>
            </div>
        </aside>

        <section class="lg:col-span-3">
            <input id="inputBusca" oninput="render()" placeholder="Buscar..." class="input-dark w-full mb-6 py-4 px-6 text-lg">
            <div id="listaClientes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="secaoDetalhes" class="hidden fixed inset-0 bg-[#0b1222]/95 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-2xl p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="detalheNome" class="text-2xl font-bold"></h2>
                <button onclick="fecharDetalhes()" class="text-slate-500"><i data-lucide="x"></i></button>
            </div>
            <div id="extratoContent" class="space-y-3"></div>
        </div>
    </div>

    <script>
        window.clientes = JSON.parse(localStorage.getItem('fiado_db_v2')) || [];

        window.onload = () => {
            lucide.createIcons();
            window.render();
            window.atualizarDashboard();
            if(window.carregarFirebase) window.carregarFirebase();
        };

        window.render = () => {
            const container = document.getElementById('listaClientes');
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            container.innerHTML = "";
            
            window.clientes.filter(c => c.nome.toLowerCase().includes(busca))
            .forEach(c => {
                const saldo = typeof c.saldo === 'number' ? c.saldo : 0;
                container.innerHTML += `
                    <div class="glass-card p-4 flex justify-between items-center">
                        <div onclick="verDetalhes(${c.id})" class="cursor-pointer">
                            <h4 class="font-bold uppercase">${c.nome}</h4>
                            <p class="text-xs text-slate-500">Saldo: R$ ${saldo.toFixed(2)}</p>
                        </div>
                        <button onclick="excluirCliente(${c.id})" class="text-rose-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`;
            });
            lucide.createIcons();
        };

        window.cadastrarCliente = () => {
            const nome = document.getElementById('inNome').value;
            const venc = document.getElementById('inVenc').value;
            if(!nome) return alert("Digite o nome");
            
            window.clientes.push({
                id: Date.now(),
                nome: nome,
                vencimento: parseInt(venc) || 1,
                saldo: 0,
                historico: []
            });
            salvar();
            document.getElementById('inNome').value = "";
            document.getElementById('inVenc').value = "";
        };

        window.verDetalhes = (id) => {
            const c = window.clientes.find(x => x.id === id);
            if(!c) return;
            document.getElementById('detalheNome').innerText = c.nome;
            
            let html = "";
            (c.historico || []).forEach(h => {
                const dataRaw = h.data?.seconds ? new Date(h.data.seconds * 1000) : new Date(h.data);
                const dataValida = isNaN(dataRaw) ? "Data n/d" : dataRaw.toLocaleDateString('pt-BR');
                const valor = typeof h.valor === 'number' ? h.valor : 0;

                html += `
                <div class="bg-slate-900/50 p-4 rounded-xl flex justify-between items-center border border-slate-800">
                    <div>
                        <p class="text-[10px] text-slate-500">${dataValida}</p>
                        <p class="font-bold text-sm uppercase">${h.prod || 'Venda'}</p>
                    </div>
                    <span class="font-bold text-emerald-400">R$ ${valor.toFixed(2)}</span>
                </div>`;
            });

            document.getElementById('extratoContent').innerHTML = html || "<p class='text-center text-slate-600'>Sem histórico</p>";
            document.getElementById('secaoDetalhes').classList.remove('hidden');
            lucide.createIcons();
        };

        function salvar() {
            localStorage.setItem('fiado_db_v2', JSON.stringify(window.clientes));
            window.render();
            window.atualizarDashboard();
            if(window.salvarFirebase) window.salvarFirebase(window.clientes);
        }

        window.atualizarDashboard = () => {
            const total = window.clientes.reduce((acc, c) => acc + (c.saldo || 0), 0);
            document.getElementById('dashTotal').innerText = `R$ ${total.toFixed(2)}`;
        };

        window.fecharDetalhes = () => document.getElementById('secaoDetalhes').classList.add('hidden');
        
        window.excluirCliente = (id) => {
            if(confirm("Excluir cliente?")) {
                window.clientes = window.clientes.filter(c => c.id !== id);
                salvar();
            }
        };
    </script>
</body>
</html>
