<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiado Pro - Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBloWH-Tf183YRw945ho8Jcc_EqsfD38tM",
            authDomain: "sistema-fiado.firebaseapp.com",
            projectId: "sistema-fiado",
            storageBucket: "sistema-fiado.firebasestorage.app",
            messagingSenderId: "28950483459",
            appId: "1:28950483459:web:8382ad04e6b9ebe076f436"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarFirebase = async (dados) => {
            try {
                const colRef = collection(db, "clientes");
                const snapshot = await getDocs(colRef);
                for (const d of snapshot.docs) { await deleteDoc(doc(db, "clientes", d.id)); }
                for (let c of dados) { await addDoc(colRef, c); }
            } catch (e) { console.error("Erro Firebase:", e); }
        };

        window.carregarFirebase = async () => {
            try {
                const snapshot = await getDocs(collection(db, "clientes"));
                const dados = snapshot.docs.map(d => d.data());
                if (dados.length > 0) {
                    window.clientes = dados;
                    window.render();
                    window.atualizarDashboard();
                }
            } catch (e) { console.error("Erro Load:", e); }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(180deg, #10b981 0%, #059669 100%); transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen p-4">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black text-white flex items-center gap-2">
            <i data-lucide="wallet" class="text-emerald-500"></i> FIADO PRO
        </h1>
        <div id="dashTotal" class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 text-emerald-400 font-bold">
            R$ 0,00
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <section class="glass-card p-6 rounded-3xl mb-8 grid grid-cols-1 md:grid-cols-4 gap-4">
            <input id="inNome" placeholder="Nome *" class="bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none">
            <input id="inApelido" placeholder="Apelido" class="bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none">
            <input id="inVenc" type="number" placeholder="Venc. (Dia)" class="bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none">
            <button onclick="cadastrarCliente()" class="btn-gradient p-3 rounded-xl font-bold text-white">Salvar</button>
        </section>

        <input id="inputBusca" oninput="render()" placeholder="Buscar cliente..." class="w-full bg-[#1e293b]/50 border border-slate-700 p-4 rounded-2xl mb-8 outline-none text-lg">

        <div id="listaClientes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <div id="secaoDetalhes" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-3xl p-8 rounded-[2rem] max-h-[90vh] overflow-y-auto border-emerald-500/30 border-2">
            <div class="flex justify-between items-center mb-6">
                <h2 id="detalheNome" class="text-2xl font-bold text-white uppercase"></h2>
                <button onclick="fecharDetalhes()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mb-8 text-center">
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                    <p class="text-[10px] text-slate-500 uppercase font-black">Comprado</p>
                    <h3 id="resumoComprado" class="text-xl font-bold text-white">R$ 0,00</h3>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                    <p class="text-[10px] text-slate-500 uppercase font-black">Pago</p>
                    <h3 id="resumoPago" class="text-xl font-bold text-emerald-400">R$ 0,00</h3>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-rose-500/30">
                    <p class="text-[10px] text-slate-500 uppercase font-black">Saldo</p>
                    <h3 id="resumoSaldo" class="text-xl font-bold text-rose-500">R$ 0,00</h3>
                </div>
            </div>

            <div id="extratoContent" class="space-y-3"></div>
        </div>
    </div>

    <script>
        window.clientes = JSON.parse(localStorage.getItem('fiado_db_v2')) || [];
        let idAtual = null;

        window.onload = () => {
            lucide.createIcons();
            window.render();
            window.atualizarDashboard();
            if(window.carregarFirebase) window.carregarFirebase();
        };

        window.render = () => {
            const container = document.getElementById('listaClientes');
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            container.innerHTML = "";
            
            window.clientes.filter(c => c.nome.toLowerCase().includes(busca))
            .forEach(c => {
                const saldo = c.saldo || 0;
                container.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center">
                        <div onclick="verDetalhes(${c.id})" class="cursor-pointer flex-1">
                            <h4 class="font-bold text-white uppercase">${c.nome}</h4>
                            <p class="text-xs text-slate-500">Saldo: R$ ${saldo.toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="excluirCliente(${c.id})" class="p-2 bg-rose-500/10 text-rose-500 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        };

        window.cadastrarCliente = () => {
            const nome = document.getElementById('inNome').value;
            if(!nome) return alert("Nome é obrigatório");
            window.clientes.push({
                id: Date.now(),
                nome: nome,
                apelido: document.getElementById('inApelido').value,
                vencimento: parseInt(document.getElementById('inVenc').value) || 1,
                saldo: 0,
                totalPago: 0,
                historico: []
            });
            salvar();
            ['inNome', 'inApelido', 'inVenc'].forEach(i => document.getElementById(i).value = "");
        };

        window.verDetalhes = (id) => {
            const c = window.clientes.find(x => x.id === id);
            if(!c) return;
            idAtual = id;
            document.getElementById('detalheNome').innerText = c.nome;
            
            // Cálculos para os cards de resumo (Igual sua Imagem 1)
            const comprado = (c.historico || []).filter(h => h.tipo === 'venda').reduce((acc, h) => acc + (h.valor || 0), 0);
            const pago = (c.historico || []).filter(h => h.tipo === 'pagamento').reduce((acc, h) => acc + (h.valor || 0), 0);
            
            document.getElementById('resumoComprado').innerText = `R$ ${comprado.toFixed(2)}`;
            document.getElementById('resumoPago').innerText = `R$ ${pago.toFixed(2)}`;
            document.getElementById('resumoSaldo').innerText = `R$ ${(comprado - pago).toFixed(2)}`;

            let html = "";
            (c.historico || []).forEach(h => {
                const dataRaw = h.data?.seconds ? new Date(h.data.seconds * 1000) : new Date(h.data);
                const dataValida = isNaN(dataRaw) ? "---" : dataRaw.toLocaleDateString('pt-BR');
                const isVenda = h.tipo === 'venda';

                html += `
                <div class="bg-slate-800/40 p-4 rounded-2xl flex justify-between items-center border border-slate-700/50">
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-lg ${isVenda ? 'bg-blue-500/10 text-blue-400' : 'bg-emerald-500/10 text-emerald-400'}">
                            <i data-lucide="${isVenda ? 'shopping-bag' : 'check-circle'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold">${dataValida}</p>
                            <p class="font-bold text-sm uppercase">${h.prod || (isVenda ? 'Venda' : 'Pagamento via Dinheiro')}</p>
                        </div>
                    </div>
                    <span class="font-black ${isVenda ? 'text-white' : 'text-emerald-400'}">
                        ${isVenda ? '' : '- '}R$ ${(h.valor || 0).toFixed(2)}
                    </span>
                </div>`;
            });

            document.getElementById('extratoContent').innerHTML = html || "<p class='text-center text-slate-600'>Sem histórico</p>";
            document.getElementById('secaoDetalhes').classList.remove('hidden');
            lucide.createIcons();
        };

        function salvar() {
            localStorage.setItem('fiado_db_v2', JSON.stringify(window.clientes));
            window.render();
            window.atualizarDashboard();
            if(window.salvarFirebase) window.salvarFirebase(window.clientes);
        }

        window.atualizarDashboard = () => {
            const total = window.clientes.reduce((acc, c) => acc + (c.saldo || 0), 0);
            document.getElementById('dashTotal').innerText = `R$ ${total.toFixed(2)}`;
        };

        window.fecharDetalhes = () => document.getElementById('secaoDetalhes').classList.add('hidden');
        
        window.excluirCliente = (id) => {
            if(confirm("Excluir cliente?")) {
                window.clientes = window.clientes.filter(c => c.id !== id);
                salvar();
            }
        };
    </script>
</body>
</html>
